<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏡 农庄卡牌：田园物语</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace, 'Microsoft Yahei', sans-serif;
            background: #0a0a0f;
            height: 100vh;
            overflow: hidden;
            padding: 0;
            margin: 0;
            color: #b3b3b3;
        }
        
        .container {
            background: rgba(17, 29, 19, 0.92);
            border: none;
            border-radius: 0;
            padding: 0px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(65, 93, 67, 0.2);
            width: 100%;
            max-width: 1800px;
            height: 100vh;
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto 35px 1fr 80px;
            grid-template-columns: 1fr 230px;
            gap: 0px;
        }
        
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .title {
            font-size: 1.4em;
            color: #8fb996;
            font-weight: bold;
        }
        
        .controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(180deg, #415d43, #111d13);
            color: #8fb996;
            border: 1px solid #709775;
            letter-spacing: 1px;
        }
        
        .btn-primary:hover {
            background: linear-gradient(180deg, #709775, #415d43);
            box-shadow: 0 0 10px rgba(112, 151, 117, 0.5);
        }
        
        .btn-danger {
            background: linear-gradient(180deg, #7d1f1f, #2d0a0a);
            color: #e8a8a8;
            border: 1px solid #a83232;
            letter-spacing: 1px;
        }
        
        .btn-danger:hover {
            background: linear-gradient(180deg, #a83232, #7d1f1f);
            box-shadow: 0 0 10px rgba(168, 50, 50, 0.5);
        }
        
        .btn-warning {
            background: linear-gradient(180deg, #8b6e27, #3b300e);
            color: #f0d68a;
            border: 1px solid #b89638;
            letter-spacing: 1px;
        }
        
        .btn-success {
            background: linear-gradient(180deg, #415d43, #111d13);
            color: #8fb996;
            border: 1px solid #709775;
            letter-spacing: 1px;
        }
        
        .btn-success:hover {
            background: linear-gradient(180deg, #709775, #415d43);
            box-shadow: 0 0 10px rgba(112, 151, 117, 0.5);
        }
        
        .btn-sm {
            padding: 3px 6px;
            font-size: 10px;
        }
        
        .top-stats {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            background: rgba(248, 249, 250, 0.05);
            padding: 2px;
            border-radius: 4px;
            height: 45px;
        }
        
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 2px;
            border-radius: 3px;
            border: 1px solid rgba(233, 236, 239, 0.1);
            text-align: center;
        }
        
        .stat-value {
            font-size: 1em;
            font-weight: bold;
            color: #8fb996;
        }
        
        .stat-label {
            font-size: 0.7em;
            color: #7f8c8d;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }
        
        .game-area {
            background: rgba(248, 249, 250, 0.05);
            border: 2px solid rgba(233, 236, 239, 0.1);
            border-radius: 0;
            padding: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            margin: 0;
            border-bottom: none;
        }
        
        #gameCanvas {
            border: 1px solid #444;
            background-color: #111;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: block;
            margin: 0 auto;
            width: 100%;
            max-height: 350px;
            width: auto;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 6px;
            height: 100%;
            overflow: hidden;
        }

        .resource-panel {
            background: rgba(65, 93, 67, 0.3);
            border-radius: 3px;
            padding: 3px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            flex-shrink: 0;
        }

        .resource {
            font-size: 0.65em;
            background: rgba(255,255,255,0.05);
            padding: 1px;
            border-radius: 1px;
            text-align: center;
            color: #b3b3b3;
        }

        #goldTargetPanel {
            background: rgba(65, 93, 67, 0.3);
            border: 1px solid #415d43;
            border-radius: 2px;
            padding: 6px;
            flex-shrink: 0;
            font-size: 0.8em;
        }

        #goldTargetPanel h4 {
            margin: 0 0 4px 0;
            font-size: 0.9em;
            color: #8fb996;
        }

        #goldTargetPanel > div {
            margin-bottom: 3px;
        }

        #goldTargetPanel .progress-bar {
            width: 100%;
            height: 4px;
            background: #111d13;
            border-radius: 2px;
            overflow: hidden;
            margin: 2px 0;
        }

        #goldTargetPanel .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #415d43, #8fb996);
            transition: width 0.3s ease;
        }

        #comboHint {
            background: rgba(139, 110, 39, 0.3);
            border-radius: 4px;
            padding: 6px;
            flex-shrink: 0;
            font-size: 0.75em;
            display: none;
        }

        #comboHint h4 {
            margin: 0 0 4px 0;
            font-size: 0.9em;
        }

        #comboList {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .combo-item {
            background: rgba(255,255,255,0.05);
            padding: 3px;
            border-radius: 2px;
        }

        #shopArea {
            background: rgba(139, 110, 39, 0.3);
            border-radius: 4px;
            padding: 4px;
            flex: 1;
            overflow: visible;
            font-size: 0.7em;
            height: 100%;
        }

        #shopArea h4 {
            margin: 0 0 3px 0;
            font-size: 0.85em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shop-cards {
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow-y: visible;
            height: calc(100% - 20px);
        }

        .shop-card {
            background: rgba(255,255,255,0.05);
            padding: 3px;
            border-radius: 2px;
            border: 2px solid;
            display: flex;
            align-items: center;
            gap: 3px;
            min-height: 0;
            flex-shrink: 1;
        }

        .shop-card-icon {
            font-size: 1.2em;
        }

        .shop-card-info {
            flex: 1;
        }

        .shop-card-name {
            font-weight: bold;
            font-size: 0.9em;
        }

        .shop-card-desc {
            font-size: 0.8em;
            color: #7f8c8d;
        }

        .bottom-section {
            grid-column: 1 / -1;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 0;
            padding: 0px;
            height: 80px;
            overflow: hidden;
            margin: 0;
            border: 2px solid rgba(233, 236, 239, 0.1);
            border-top: none;
        }

        #handArea {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 5px;
            height: 100%;
            align-items: center;
        }

        .card {
            flex-shrink: 0;
            width: 80px;
            height: 90px;
            background: rgba(255,255,255,0.95);
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            padding: 4px;
            text-align: center;
            cursor: grab;
            border: 2px solid;
        }

        .card .icon {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .card .name {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 4px;
            color: #222;
        }

        .card .desc {
            font-size: 0.7em;
            color: #555;
            margin-bottom: 4px;
        }

        .card .level {
            font-size: 0.7em;
            margin-bottom: 4px;
        }

        .card .cost {
            font-size: 0.8em;
            color: #f39c12;
        }

        .rarity-common { border-color: #3498db; }
        .rarity-uncommon { border-color: #27ae60; }
        .rarity-rare { border-color: #9b59b6; }
        .rarity-legendary { border-color: #e67e22; }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题+控制栏 -->
        <div class="header">
            <h1 class="title">🏡 农庄卡牌：田园物语</h1>
            <div class="controls">
                <button class="btn btn-primary" onclick="window.FarmGameApp.start()">🎮 开始</button>
                <button class="btn btn-primary" onclick="window.FarmGameApp.pause()">⏸️ 暂停</button>
                <button class="btn btn-success" onclick="window.FarmGameApp.nextDay()">🌅 下一天</button>
                <button class="btn btn-danger" onclick="window.FarmGameApp.resetGame()">🔄 重置</button>
                <button class="btn btn-warning" onclick="window.FarmGameApp.clearCacheAndReload()">🗑️ 清缓存</button>
            </div>
        </div>

        <!-- 顶部统计栏 -->
        <div class="top-stats">
            <div class="stat">
                <div class="stat-value" id="energyCount">3</div>
                <div class="stat-label">⚡ 能量</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="dayCount">1</div>
                <div class="stat-label">📅 天数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="moneyCount">100</div>
                <div class="stat-label">💰 金币</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="levelCount">1</div>
                <div class="stat-label">⭐ 等级</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="expCount">0%</div>
                <div class="stat-label">📊 经验</div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 游戏画布 -->
            <div class="game-area">
                <canvas id="gameCanvas" width="800" height="340"></canvas>
            </div>
        </div>

        <!-- 右侧边栏 -->
        <div class="sidebar">
            <!-- 资源面板 -->
            <div class="resource-panel">
                <div class="resource">
                    <span>🌾</span> <span id="wheatCount">0</span>
                </div>
                <div class="resource">
                    <span>🥕</span> <span id="carrotCount">0</span>
                </div>
                <div class="resource">
                    <span>🥔</span> <span id="potatoCount">0</span>
                </div>
                <div class="resource">
                    <span>🍅</span> <span id="tomatoCount">0</span>
                </div>
                <div class="resource">
                    <span>🐔</span> <span id="chickenCount">0</span>
                </div>
                <div class="resource">
                    <span>🦆</span> <span id="duckCount">0</span>
                </div>
                <div class="resource">
                    <span>🐑</span> <span id="sheepCount">0</span>
                </div>
                <div class="resource">
                    <span>🐷</span> <span id="pigCount">0</span>
                </div>
                <div class="resource">
                    <span>🥚</span> <span id="eggCount">0</span>
                </div>
                <div class="resource">
                    <span>🪺</span> <span id="duckEggCount">0</span>
                </div>
                <div class="resource">
                    <span>🥛</span> <span id="milkCount">0</span>
                </div>
                <div class="resource">
                    <span>🧶</span> <span id="woolCount">0</span>
                </div>
                <div class="resource">
                    <span>🥩</span> <span id="porkCount">0</span>
                </div>
                <div class="resource">
                    <span>🍎</span> <span id="appleCount">0</span>
                </div>
                <div class="resource">
                    <span>🍞</span> <span id="flourCount">0</span>
                </div>
            </div>

            <!-- 金币目标面板 -->
            <div id="goldTargetPanel">
                <h4>💰 腐化金币目标</h4>
                <div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 2px;">
                        <span>今日目标:</span>
                        <span id="dailyTarget">0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 2px;">
                        <span>当前:</span>
                        <span id="currentGold">0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 2px;">
                        <span>完成度:</span>
                        <span id="targetPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="targetProgress" class="progress-fill"></div>
                    </div>
                </div>
                <div style="font-size: 0.8em; color: #709775; margin-top: 2px;">
                    阶段: <span id="currentStage">1</span> | 连续: <span id="streakDays">0</span> 天
                </div>
            </div>

            <!-- 组合提示 -->
            <div id="comboHint" style="display: none;">
                <h4>💡 可合成组合</h4>
                <div id="comboList"></div>
            </div>

            <!-- 商店区域 -->
            <div id="shopArea">
                <h4>
                    🛒 每日商店
                    <button class="btn btn-sm btn-primary" onclick="window.FarmGameApp.refreshHandCards()">🔄 刷新</button>
                </h4>
                <div class="shop-cards" id="shopCards"></div>
            </div>
        </div>

        <!-- 底部手牌区 -->
        <div class="bottom-section">
            <div id="handArea"></div>
        </div>
    </div>

    <script>
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🏡 农庄卡牌：田园物语 - 页面加载完成');
            console.log('ECS架构的肉鸽种地游戏');
            console.log('项目地址：https://github.com/yangtzehina/farm-game-ecs');
        });
    </script>
    <script src="bundle.js"></script>
</body>
</html>
